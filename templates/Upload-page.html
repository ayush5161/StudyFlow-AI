<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>StudyFlow — Upload</title>
<link rel="stylesheet" href="{{ url_for('static', filename='Upload-page.css') }}">
</head>
<body>

<header class="navbar">
  <div class="logo">StudyFlow</div>
  <nav>
    <a href="/upload_page">Upload</a>
    <a href="/status">Status</a>
    <a href="/schedule_page">Schedule</a>
    <a href="/logout">Logout</a>
  </nav>
</header>

<section class="hero">
  <div class="upload-box">
    <h3>Upload Files (syllabus documents and datesheet images/pdf)</h3>

    <div class="drop-area" id="syllabusDrop">
      <p>Drag & Drop Syllabus (docx/pdf)</p>
      <label class="file-btn">Choose File
        <input id="syllabusInput" type="file" multiple>
      </label>
      <div class="file-name" id="syllabusName">No file chosen</div>
    </div>

    <div class="drop-area" id="datesheetDrop">
      <p>Drag & Drop Datesheet (image/pdf)</p>
      <label class="file-btn">Choose File
        <input id="datesheetInput" type="file">
      </label>
      <div class="file-name" id="datesheetName">No file chosen</div>
    </div>

    <button class="btn-primary upload-btn" id="uploadBtn">Generate Study Plan</button>
  </div>
</section>

<script src="{{ url_for('static', filename='upload.js') }}"></script>
</body>
</html>
